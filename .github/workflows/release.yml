name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/elevarq/arq-signals

jobs:
  # ── Gate A: Correctness ───────────────────────────────────────────────
  validate:
    name: Validate Release
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify CHANGELOG contains this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "STOP: CHANGELOG.md has no entry for version ${VERSION}"
            exit 1
          fi
          echo "CHANGELOG entry found for ${VERSION}"

  test:
    name: Test
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Boundary tests
        run: >
          go test -v -run
          'TestNoAnalyzerImports|TestNoLLMCode|TestNoScoringCode|TestNoProprietaryContent|TestLicenseFileExists'
          ./tests/

  # ── Gate B: Lint / Quality ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  # ── Gate C: Security ──────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Build image for scanning
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          docker build \
            --build-arg VERSION="${VERSION}" \
            --build-arg COMMIT="${COMMIT}" \
            --build-arg DATE="${DATE}" \
            -t arq-signals:scan .

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: image
          image-ref: arq-signals:scan
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      # Use the gitleaks binary directly rather than the now-paywalled
      # gitleaks/gitleaks-action wrapper. Same tool, same scan, no
      # licensing surface. Matches the approach in ci.yml so the two
      # workflows stay consistent.
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Gitleaks detect
        run: gitleaks detect --source . --verbose --exit-code 1

  # ── Gate D + E: Build, Sign & Publish ─────────────────────────────────
  publish:
    name: Publish to GHCR
    needs: [validate, test, lint, security-scan]
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v5

      # QEMU is required so buildx can produce arm64 layers on an amd64
      # runner — Go cross-compiles natively, but Alpine apk add and
      # adduser in the runtime stage execute on each target arch.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # latest=auto: only the highest non-pre-release semver also
          # gets the floating `latest` tag. Pre-releases (vX.Y.Z-rc.1)
          # never overwrite latest. `latest` is produced by CI only —
          # never pushed manually.
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          # OCI annotations land on the image manifest. metadata-action
          # sets a baseline (source, revision, created); the explicit
          # labels below add the rest of the org.opencontainers.image.*
          # set so consumers can identify the build without pulling.
          labels: |
            org.opencontainers.image.title=arq-signals
            org.opencontainers.image.description=Open-source PostgreSQL diagnostic signal collector — local-first, no data egress.
            org.opencontainers.image.licenses=BSD-3-Clause
            org.opencontainers.image.vendor=Elevarq
            org.opencontainers.image.documentation=https://github.com/Elevarq/Arq-Signals/blob/main/README.md

      - name: Build and push (multi-arch + SBOM + SLSA provenance)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Multi-arch manifest list. Buildx produces both per-arch
          # images and publishes a single manifest list at the digest;
          # `docker pull` auto-selects by host platform.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          # Registry-attached SBOM: buildkit generates a per-platform
          # SPDX SBOM and pushes it as an OCI attestation referenced
          # from the image digest. Consumers retrieve it with
          # `cosign download sbom <image>` (or `docker buildx
          # imagetools inspect --format '{{json .SBOM}}'`).
          sbom: true
          # SLSA build provenance attestation, mode=max. Records the
          # builder identity, source materials, build parameters, and
          # output digests in an in-toto statement attached to the
          # image. Verifiable with `cosign verify-attestation
          # --type slsaprovenance ...`.
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing: sigstore Fulcio issues a short-lived
      # certificate bound to this workflow's GitHub OIDC identity. No
      # long-lived signing key is stored anywhere. Verification at
      # consumption time binds the signature back to the workflow ref
      # via the certificate identity (see docs/release-verification.md).
      - name: Sign image (cosign keyless)
        run: cosign sign --yes ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

      # The release also publishes a downloadable SPDX SBOM file as a
      # workflow artifact. This is independent of the registry-attached
      # SBOM (sbom: true above) — the file artifact lets consumers
      # download the SBOM without pulling the image at all.
      - name: Generate SBOM artifact (file)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v5
        with:
          name: sbom
          path: sbom.spdx.json

  # ── Go binary artifacts ───────────────────────────────────────────────
  build-binaries:
    name: Build Go Binaries
    needs: [validate, test, security-scan]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          LDFLAGS="-X github.com/elevarq/arq-signals/internal/safety.Version=${VERSION}"
          LDFLAGS="${LDFLAGS} -X github.com/elevarq/arq-signals/internal/safety.Commit=${GITHUB_SHA::8}"
          LDFLAGS="${LDFLAGS} -X github.com/elevarq/arq-signals/internal/safety.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -o "dist/arq-signals-${GOOS}-${GOARCH}" ./cmd/arq-signals
          go build -ldflags "${LDFLAGS}" -o "dist/arqctl-${GOOS}-${GOARCH}" ./cmd/arqctl

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v5
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  # ── Gate F: Release ───────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [validate, publish, build-binaries]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Download SBOM
        uses: actions/download-artifact@v5
        with:
          name: sbom

      - name: Download all binaries
        uses: actions/download-artifact@v5
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum ./* > SHA256SUMS

      - name: Extract changelog for this version
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "Release ${VERSION}" > release-notes.md
          fi
          cat >> release-notes.md <<EOF

          ---

          ## Supply chain

          - Image: \`${{ env.IMAGE_NAME }}:${VERSION}\`
          - Digest: \`${{ needs.publish.outputs.digest }}\`
          - Architectures: \`linux/amd64\`, \`linux/arm64\`
          - Cosign-signed (keyless, GitHub OIDC)
          - SBOM attached as OCI attestation **and** as \`sbom.spdx.json\` release asset
          - SLSA build provenance attestation (\`mode=max\`)

          Quick signature verification:
          \`\`\`bash
          cosign verify ${{ env.IMAGE_NAME }}:${VERSION} \
            --certificate-identity-regexp='github.com/Elevarq/Arq-Signals/.github/workflows/release.yml@' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com'
          \`\`\`

          Full verification checklist (manifest, SBOM, provenance, Trivy):
          [docs/release-verification.md](https://github.com/Elevarq/Arq-Signals/blob/main/docs/release-verification.md)
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            sbom.spdx.json
            dist/*
          generate_release_notes: false
