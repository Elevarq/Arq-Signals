# arq-signals quick start
#
# Start arq-signals alongside a PostgreSQL 16 instance:
#   docker compose -f examples/docker-compose.yml up -d
#
# Trigger a collection:
#   curl -X POST http://localhost:8081/collect/now -H "Authorization: Bearer test-token"
#
# Export snapshots:
#   curl -o snapshot.zip http://localhost:8081/export -H "Authorization: Bearer test-token"

services:
  arq-signals:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      ARQ_SIGNALS_TARGET_HOST: postgres
      ARQ_SIGNALS_TARGET_PORT: "5432"
      ARQ_SIGNALS_TARGET_USER: arq_monitor
      ARQ_SIGNALS_TARGET_DBNAME: postgres
      ARQ_SIGNALS_TARGET_PASSWORD_ENV: PG_PASSWORD
      PG_PASSWORD: monitor_pass
      ARQ_SIGNALS_POLL_INTERVAL: 1m
      ARQ_SIGNALS_API_TOKEN: test-token
      ARQ_ALLOW_INSECURE_PG_TLS: "true"
      ARQ_ENV: dev
    ports:
      - "8081:8081"
    volumes:
      - signals-data:/data
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres_pass
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  signals-data:
